<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premier Asset Partners | Digital Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --accent:#D7F591;--accent-light:#D7F591;--accent-dim:rgba(215,245,145,0.12);
    --dark-green:#283428;--mid-green:#3C543C;--lime:#D7F591;
    --bg:#151516;--card:rgba(40,52,40,0.55);--card-border:rgba(215,245,145,0.10);--card-hover:rgba(60,84,60,0.50);
    --text:#FFFFFF;--text-dim:rgba(255,255,255,0.45);--text-mid:rgba(255,255,255,0.7);
    --green:#D7F591;--red:#FF5252;--blue:#82B1FF;--orange:#FFD180;
    --instagram:#E1306C;--facebook:#1877F2;--linkedin:#0A66C2;
    --radius:16px;--radius-sm:10px;
    --font-heading:'Bona Nova SC','Georgia','Times New Roman',serif;
    --font-body:'Hanken Grotesk','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.6;min-height:100vh;overflow-x:hidden;padding:0;}
  h1,h2,h3,h4,h5,h6,.brand,.chart-title{font-family:var(--font-heading);font-weight:400;text-transform:none;}

  /* HEADER */
  .header{background:linear-gradient(180deg,rgba(60,84,60,0.15) 0%,transparent 100%);border-bottom:1px solid var(--card-border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
  .logo-area{display:flex;align-items:center;gap:14px;}
  .logo-seal{width:48px;height:48px;}
  .logo-divider{width:1px;height:28px;background:var(--card-border);}
  .logo-text{display:flex;flex-direction:column;}
  .logo-text .brand{font-size:13px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
  .logo-text .sub{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .header-date{font-size:12px;color:var(--text-dim);}
  .header-badge{background:var(--accent-dim);color:var(--accent);font-size:10px;font-weight:700;padding:4px 12px;border-radius:50px;border:1px solid rgba(215,245,145,0.2);letter-spacing:1px;text-transform:uppercase;}

  /* NAV */
  .nav-tabs{display:flex;gap:4px;padding:10px 24px;border-bottom:1px solid var(--card-border);background:rgba(21,21,22,0.9);backdrop-filter:blur(12px);position:sticky;top:61px;z-index:99;overflow-x:auto;}
  .nav-tab{padding:8px 18px;font-size:11px;font-weight:500;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:50px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:none;white-space:nowrap;}
  .nav-tab:hover{color:var(--text-mid);background:rgba(255,255,255,0.04);border-color:rgba(215,245,145,0.18);}
  .nav-tab.active{color:var(--dark-green);background:var(--accent);border-color:var(--accent);}

  /* MONTH TABS */
  .month-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
  .month-tab{padding:6px 14px;font-size:10px;font-weight:600;color:var(--text-dim);background:transparent;border:1px solid var(--card-border);border-radius:50px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase;}
  .month-tab:hover{color:var(--text-mid);background:rgba(255,255,255,0.04);}
  .month-tab.active{color:var(--dark-green);background:var(--accent);border-color:var(--accent);}

  /* MAIN */
  .main{padding:20px 24px 40px;max-width:1400px;margin:0 auto;}
  .section-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;margin-top:6px;display:flex;align-items:center;gap:12px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--card-border);}

  /* METRIC CARDS */
  .metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .metrics-row-6{grid-template-columns:repeat(6,1fr);}
  .metric-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;transition:all 0.2s;position:relative;overflow:hidden;}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--lime));opacity:0;transition:opacity 0.2s;}
  .metric-card:hover{box-shadow:0 12px 40px rgba(215,245,145,0.06);transform:translateY(-2px);background:var(--card-hover);border-color:rgba(215,245,145,0.18);}
  .metric-card:hover::before{opacity:1;}
  .metric-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:12px;}
  .metric-label{font-size:10px;color:var(--text-dim);margin-bottom:4px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
  .metric-value{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.5px;line-height:1.1;}
  .metric-change{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;margin-top:8px;padding:3px 8px;border-radius:50px;}
  .metric-change.up{color:var(--green);background:rgba(215,245,145,0.1);}
  .metric-change.down{color:var(--red);background:rgba(255,82,82,0.1);}
  .metric-change.neutral{color:var(--text-dim);background:rgba(255,255,255,0.05);}

  /* PLATFORM CARDS */
  .platform-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  .platform-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;transition:all 0.2s;position:relative;overflow:hidden;}
  .platform-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.2);transform:translateY(-2px);background:var(--card-hover);}
  .platform-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--card-border);}
  .platform-name{display:flex;align-items:center;gap:8px;}
  .platform-dot{width:8px;height:8px;border-radius:50%;}
  .platform-name span{font-size:13px;font-weight:600;letter-spacing:0.3px;}
  .platform-badge{font-size:10px;font-weight:500;padding:3px 10px;border-radius:50px;background:rgba(255,255,255,0.05);color:var(--text-dim);border:1px solid var(--card-border);}
  .platform-stat{margin-bottom:10px;}
  .platform-stat:last-child{margin-bottom:0;}
  .platform-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px;}
  .platform-stat-value{font-size:17px;font-weight:700;letter-spacing:-0.3px;color:var(--text);}
  .platform-stat-sub{font-size:9px;font-weight:600;margin-top:1px;}

  /* INSIGHTS */
  .insights-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
  .insight-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;}
  .insight-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;font-weight:700;}
  .insight-text{font-size:12px;color:var(--text-mid);line-height:1.6;}

  /* CHARTS */
  .charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:24px;}
  .charts-grid-equal{grid-template-columns:1fr 1fr;}
  .chart-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;}
  .chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .chart-title{font-size:12px;font-weight:400;letter-spacing:0.2px;}
  .chart-container{position:relative;height:240px;}

  /* AUDIENCE */
  .audience-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:10px;}
  .audience-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
  .audience-row:last-child{border-bottom:none;margin-bottom:0;}
  .audience-row-label{color:var(--text-dim);}
  .audience-row-value{color:var(--text);font-weight:600;}

  /* TABLE */
  .table-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:24px;overflow:hidden;}
  .table-wrapper{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px;padding:10px 12px;border-bottom:1px solid var(--card-border);}
  tbody td{padding:10px 12px;font-size:12px;color:var(--text-mid);border-bottom:1px solid rgba(255,255,255,0.03);}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  tbody tr:last-child td{border-bottom:none;}

  /* AD CARDS */
  .ad-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
  .ad-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
  .ad-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--mid-green),var(--lime));opacity:0.5;}

  /* PENDING */
  .pending-state{text-align:center;padding:60px 30px;color:var(--text-dim);}
  .pending-state-icon{font-size:40px;margin-bottom:12px;opacity:0.3;}
  .pending-state-text{font-size:13px;max-width:380px;margin:0 auto;line-height:1.6;}

  /* POST CARDS */
  .post-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;margin-bottom:10px;transition:all 0.2s;position:relative;overflow:hidden;}
  .post-card:hover{background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.15);}
  .post-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .post-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
  .post-rank.top{background:rgba(215,245,145,0.15);color:var(--green);border:1px solid rgba(215,245,145,0.3);}
  .post-rank.bottom{background:rgba(255,82,82,0.1);color:var(--red);border:1px solid rgba(255,82,82,0.2);}
  .post-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .post-platform-tag{font-size:9px;font-weight:700;padding:3px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:0.5px;}
  .post-type-tag{font-size:9px;font-weight:600;padding:3px 10px;border-radius:50px;background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid var(--card-border);}
  .post-caption{font-size:12px;color:var(--text-mid);line-height:1.6;margin-bottom:12px;}
  .post-link{font-size:10px;color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.3px;display:inline-flex;align-items:center;gap:4px;transition:opacity 0.2s;}
  .post-link:hover{opacity:0.8;}

  /* FEEDBACK CARDS */
  .feedback-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;margin-bottom:12px;transition:all 0.2s;position:relative;overflow:hidden;}
  .feedback-card:hover{background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.15);}
  .feedback-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0.8;border-radius:var(--radius) var(--radius) 0 0;}
  .feedback-card.positive::before{background:var(--green);}
  .feedback-card.caution::before{background:var(--orange);}
  .feedback-card.action::before{background:var(--blue);}
  .feedback-icon{font-size:24px;margin-bottom:12px;}
  .feedback-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3;}
  .feedback-text{font-size:12px;color:var(--text-mid);line-height:1.7;}
  .feedback-tag{display:inline-block;font-size:9px;font-weight:700;padding:3px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
  .feedback-tag.positive{background:rgba(215,245,145,0.12);color:var(--green);}
  .feedback-tag.caution{background:rgba(255,209,128,0.12);color:var(--orange);}
  .feedback-tag.action{background:rgba(130,177,255,0.12);color:var(--blue);}

  /* FOOTER */
  .footer{border-top:1px solid var(--card-border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
  .footer-left{font-size:11px;color:var(--text-dim);}
  .footer-brand{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
  .footer-brand a{color:var(--accent);text-decoration:none;font-weight:600;}

  .best{color:var(--green) !important;}

  @media(max-width:900px){.metrics-row,.metrics-row-6,.platform-grid,.ad-metrics{grid-template-columns:repeat(2,1fr);}.charts-grid{grid-template-columns:1fr;}}
  @media(max-width:600px){.metrics-row,.metrics-row-6,.platform-grid,.ad-metrics{grid-template-columns:1fr;}.main{padding:14px;}.header{padding:12px 14px;}.nav-tabs{padding:8px 14px;}.insights-grid{grid-template-columns:1fr;}.footer{flex-direction:column;gap:4px;text-align:center;}}
</style>
</head>

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toLocaleString();
}
function bestPlatform(month, key) {
  const m = DATA[month]; if (!m) return '';
  let best='', bestVal=-Infinity;
  PLATFORMS.forEach(p => { if (m[p.id] && m[p.id][key] > bestVal) { bestVal=m[p.id][key]; best=p.id; } });
  return best;
}

      <div class="post-meta">
        <span class="post-platform-tag" style="background:${platColor}22;color:${platColor};border:1px solid ${platColor}44;">${post.platform}</span>

    </div>
    <div class="post-caption">${post.caption}</div>
    <a href="${post.url}" target="_blank" class="post-link">View Post &#x2197;</a>

}

        <div class="metric-card"><div class="metric-icon" style="background:rgba(215,245,145,0.1);color:var(--green);">&#x2764;</div><div class="metric-label">Total Engagement</div><div class="metric-value">${agg.totalEngagement}</div><div class="metric-change neutral">INTERACTIONS</div></div>
        <div class="metric-card"><div class="metric-icon" style="background:rgba(255,209,128,0.1);color:var(--orange);">&#x1F4C8;</div><div class="metric-label">Avg Eng. Rate</div><div class="metric-value">${agg.avgEngagementRate}</div><div class="metric-change neutral">CROSS-PLATFORM</div></div>
        <div class="metric-card"><div class="metric-icon" style="background:rgba(130,177,255,0.1);color:var(--blue);">&#x1F465;</div><div class="metric-label">Total Followers</div><div class="metric-value">${agg.totalFollowers}</div><div class="metric-change neutral">ALL PLATFORMS</div></div>
        <div class="metric-card"><div class="metric-icon" style="background:rgba(215,245,145,0.1);color:var(--green);">&#x2728;</div><div class="metric-label">Growth</div><div class="metric-value">+${agg.growth}</div><div class="metric-change up">GROWING</div></div>
      </div>
      <div class="section-label">By Platform &mdash; ${monthLabel}</div>
      <div class="platform-grid">
        ${PLATFORMS.map(p => {
          const d=md[p.id]; const isBestEng=p.id===bestEng; const isBestViews=p.id===bestViews;
          const gc=d.growth>0?'up':d.growth<0?'down':'neutral'; const gp=d.growth>0?'+':'';
          return `<div class="platform-card">
            <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${p.color};opacity:0.7;border-radius:var(--radius) var(--radius) 0 0;"></div>
            <div class="platform-header"><div class="platform-name"><div class="platform-dot" style="background:${p.color};"></div><span>${p.name}</span></div><div class="platform-badge">${p.handle}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Followers</div><div class="platform-stat-value">${d.followers.toLocaleString()}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Views</div><div class="platform-stat-value ${isBestViews?'best':''}">${d.views}</div>${isBestViews?'<div class="platform-stat-sub" style="color:var(--green);">&#9733; HIGHEST</div>':''}</div>
            <div class="platform-stat"><div class="platform-stat-label">Posts</div><div class="platform-stat-value">${d.posts}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Engagement</div><div class="platform-stat-value">${d.engagement}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Engagement Rate</div><div class="platform-stat-value ${isBestEng?'best':''}">${d.engagementRate}</div>${isBestEng?'<div class="platform-stat-sub" style="color:var(--green);">&#9733; HIGHEST</div>':''}</div>
            <div class="platform-stat"><div class="platform-stat-label">Growth</div><div class="platform-stat-value"><span class="metric-change ${gc}">${gp}${d.growth}</span></div></div>
          </div>`;
        }).join('')}
      </div>
      <div class="section-label">Visual Breakdown &mdash; ${monthLabel}</div>
      <div class="charts-grid"><div class="chart-card"><div class="chart-header"><div class="chart-title">Views by Platform</div></div><div class="chart-container"><canvas id="viewsChart"></canvas></div></div><div class="chart-card"><div class="chart-header"><div class="chart-title">Engagement Distribution</div></div><div class="chart-container"><canvas id="engDoughnut"></canvas></div></div></div>
      <div class="charts-grid charts-grid-equal"><div class="chart-card"><div class="chart-header"><div class="chart-title">Engagement Rate by Platform</div></div><div class="chart-container"><canvas id="engRateChart"></canvas></div></div><div class="chart-card"><div class="chart-header"><div class="chart-title">Follower Distribution</div></div><div class="chart-container"><canvas id="followerDoughnut"></canvas></div></div></div>
    `;
    initOverviewCharts();

  } else if (currentTab === 'social') {
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Platform Performance &mdash; ${monthLabel}</div>
      <div class="table-card"><div class="chart-header"><div class="chart-title">All Platforms Comparison</div></div><div class="table-wrapper"><table><thead><tr><th>Platform</th><th>Followers</th><th>Views</th><th>Posts</th><th>Engagement</th><th>Eng. Rate</th><th>Growth</th></tr></thead><tbody>
        ${PLATFORMS.map(p => { const d=md[p.id]; const gc=d.growth>0?'color:var(--green)':d.growth<0?'color:var(--red)':''; const gp=d.growth>0?'+':'';
          return `<tr><td style="color:var(--text);font-weight:600;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px;"></span>${p.name}</td><td>${d.followers.toLocaleString()}</td><td style="font-weight:600;">${d.views}</td><td>${d.posts}</td><td>${d.engagement}</td><td style="font-weight:600;">${d.engagementRate}</td><td style="${gc};font-weight:600;">${gp}${d.growth}</td></tr>`;
        }).join('')}
      </tbody></table></div></div>
      <div class="section-label">Platform Contribution &mdash; ${monthLabel}</div>
      <div class="charts-grid charts-grid-equal"><div class="chart-card"><div class="chart-header"><div class="chart-title">Views Distribution</div></div><div class="chart-container"><canvas id="socialViewsDoughnut"></canvas></div></div><div class="chart-card"><div class="chart-header"><div class="chart-title">Engagement Contribution</div></div><div class="chart-container"><canvas id="socialEngDoughnut"></canvas></div></div></div>
    `;
    initSocialCharts();

  } else if (currentTab === 'paid') {
    const ads=md.ads; const hasCampaigns=ads.campaigns&&ads.campaigns.length>0;
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Paid Advertising &mdash; ${monthLabel}</div>
      <div class="ad-metrics">
        <div class="ad-card"><div class="metric-label">Ad Spend</div><div class="metric-value">${ads.spend}</div></div>
        <div class="ad-card"><div class="metric-label">Impressions</div><div class="metric-value">${ads.impressions}</div></div>
        <div class="ad-card"><div class="metric-label">Clicks</div><div class="metric-value">${ads.clicks}</div></div>
        <div class="ad-card"><div class="metric-label">CTR</div><div class="metric-value">${ads.ctr}</div></div>
      </div>
      <div class="ad-metrics">
        <div class="ad-card"><div class="metric-label">Conversions</div><div class="metric-value">${ads.conversions}</div></div>
        <div class="ad-card"><div class="metric-label">Cost Per Click</div><div class="metric-value">${ads.cpc}</div></div>
        <div class="ad-card"><div class="metric-label">ROAS</div><div class="metric-value">${ads.roas}</div></div>
        <div class="ad-card"><div class="metric-label">Campaigns</div><div class="metric-value">${hasCampaigns?ads.campaigns.length:'—'}</div></div>
      </div>
      ${!hasCampaigns?`<div class="pending-state" style="padding:30px;"><div class="pending-state-icon">&#x1F4B0;</div><div class="pending-state-text">Paid advertising data will be populated here once campaign metrics are provided.</div></div>`:''}
    `;

  } else if (currentTab === 'insights') {
    const ins=md.insights; const hasInsights=ins&&(ins.worked||ins.didntWork||ins.improvements||ins.audienceInsight);
    const hasTopPosts = md.topPosts && md.topPosts.length > 0;
    const hasBottomPosts = md.bottomPosts && md.bottomPosts.length > 0;
    main.innerHTML = `
      ${monthHTML}
      ${(hasTopPosts || hasBottomPosts) ? `
        <div class="section-label">Top Performing Posts &mdash; ${monthLabel}</div>
        ${hasTopPosts ? md.topPosts.map(p => renderPostCard(p, true)).join('') : ''}

        ${hasBottomPosts ? `
          <div class="section-label" style="margin-top:24px;">Lowest Performing Posts &mdash; ${monthLabel}</div>
          ${md.bottomPosts.map(p => renderPostCard(p, false)).join('')}
        ` : ''}
      ` : ''}

      <div class="section-label" style="margin-top:24px;">Content Strategy Insights &mdash; ${monthLabel}</div>
      ${hasInsights ? `<div class="insights-grid">
        ${ins.worked?`<div class="insight-card"><div class="insight-label" style="color:var(--green);">What Worked</div><div class="insight-text">${ins.worked}</div></div>`:''}
        ${ins.didntWork?`<div class="insight-card"><div class="insight-label" style="color:var(--red);">What Didn't Work</div><div class="insight-text">${ins.didntWork}</div></div>`:''}
        ${ins.improvements?`<div class="insight-card"><div class="insight-label" style="color:var(--accent);">Improvements</div><div class="insight-text">${ins.improvements}</div></div>`:''}
        ${ins.audienceInsight?`<div class="insight-card"><div class="insight-label" style="color:var(--blue);">Audience Insight</div><div class="insight-text">${ins.audienceInsight}</div></div>`:''}
      </div>` : `<div class="pending-state" style="padding:30px;"><div class="pending-state-icon">&#x1F4A1;</div><div class="pending-state-text">Detailed content insights will be added as patterns emerge.</div></div>`}
      <div class="section-label">Platform Snapshot &mdash; ${monthLabel}</div>
      <div class="platform-grid">
        ${PLATFORMS.map(p => { const d=md[p.id]; return `<div class="platform-card">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${p.color};opacity:0.7;border-radius:var(--radius) var(--radius) 0 0;"></div>
          <div class="platform-header"><div class="platform-name"><div class="platform-dot" style="background:${p.color};"></div><span>${p.name}</span></div></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="platform-stat"><div class="platform-stat-label">Views</div><div class="platform-stat-value">${d.views}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Eng. Rate</div><div class="platform-stat-value">${d.engagementRate}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Engagement</div><div class="platform-stat-value">${d.engagement}</div></div>
            <div class="platform-stat"><div class="platform-stat-label">Posts</div><div class="platform-stat-value">${d.posts}</div></div>
          </div></div>`; }).join('')}
      </div>
    `;

  } else if (currentTab === 'audience') {
    const aud=md.audience;
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Audience Overview &mdash; ${monthLabel}</div>
      <div class="charts-grid charts-grid-equal" style="margin-bottom:14px;">
        <div class="audience-card"><div class="chart-header"><div class="chart-title">Demographics</div></div>
          <div class="audience-row"><span class="audience-row-label">Gender Split</span><span class="audience-row-value">${aud.gender}</span></div>
          <div class="audience-row"><span class="audience-row-label">Primary Location</span><span class="audience-row-value">${aud.location}</span></div>
          <div class="audience-row"><span class="audience-row-label">Age Range</span><span class="audience-row-value">${aud.age}</span></div>
          <div class="audience-row"><span class="audience-row-label">Profession</span><span class="audience-row-value">${aud.profession}</span></div>
        </div>
        <div class="audience-card"><div class="chart-header"><div class="chart-title">Follower Summary</div></div>
          ${PLATFORMS.map(p => { const d=md[p.id]; const gp=d.growth>0?'+':''; const gc=d.growth>0?'var(--green)':d.growth<0?'var(--red)':'var(--text-dim)';
            return `<div class="audience-row"><span class="audience-row-label"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px;"></span>${p.name} (${d.followers})</span><span class="audience-row-value" style="color:${gc};">${gp}${d.growth} growth</span></div>`; }).join('')}
          <div class="audience-row" style="border-top:1px solid var(--card-border);padding-top:10px;margin-top:4px;"><span class="audience-row-label" style="font-weight:600;color:var(--text);">Total Followers</span><span class="audience-row-value" style="color:var(--accent);">${md.aggregate.totalFollowers}</span></div>
          <div class="audience-row"><span class="audience-row-label" style="font-weight:600;color:var(--text);">Total Growth</span><span class="audience-row-value" style="color:var(--accent);">+${md.aggregate.growth}</span></div>
        </div>
      </div>
      <div class="section-label">Platform Engagement Comparison</div>
      <div class="charts-grid"><div class="chart-card"><div class="chart-header"><div class="chart-title">Engagement Rate by Platform</div></div><div class="chart-container"><canvas id="audEngChart"></canvas></div></div><div class="chart-card"><div class="chart-header"><div class="chart-title">Engagement Distribution</div></div><div class="chart-container"><canvas id="audSplitChart"></canvas></div></div></div>
    `;
    initAudienceCharts();

  } else if (currentTab === 'feedback') {
    const fb = md.feedback || [];
    main.innerHTML = `
      ${monthHTML}
      <div class="section-label">Feedback &amp; Next Steps &mdash; ${monthLabel}</div>
      ${fb.length > 0 ? fb.map(item => renderFeedbackCard(item)).join('') : `
        <div class="pending-state" style="padding:30px;">
          <div class="pending-state-icon">&#x1F4AC;</div>
          <div class="pending-state-text">Feedback and next steps will be added after the monthly content review.</div>
        </div>
      `}
    `;
  }
}

// Charts
Chart.defaults.color = 'rgba(255,255,255,0.45)';
Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
Chart.defaults.font.family = "'Hanken Grotesk','Inter',sans-serif";
let charts = {};
function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }
function getPlatColors() { return PLATFORMS.map(p=>p.color); }
function getPlatNames() { return PLATFORMS.map(p=>p.name); }
function getMetric(key) { const md=DATA[currentMonth]; return PLATFORMS.map(p=> md&&md[p.id]?md[p.id][key]:0); }

function initOverviewCharts() {
  destroyChart('viewsChart'); destroyChart('engDoughnut'); destroyChart('engRateChart'); destroyChart('followerDoughnut');
  const c1=document.getElementById('viewsChart')?.getContext('2d');
  if(c1) charts['viewsChart']=new Chart(c1,{type:'bar',data:{labels:getPlatNames(),datasets:[{label:'Views',data:getMetric('viewsNum'),backgroundColor:getPlatColors().map(c=>c+'CC'),borderRadius:8,barPercentage:0.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{callback:v=>formatNum(v)}},x:{grid:{display:false}}}}});
  const c2=document.getElementById('engDoughnut')?.getContext('2d');
  if(c2) charts['engDoughnut']=new Chart(c2,{type:'doughnut',data:{labels:getPlatNames(),datasets:[{data:getMetric('engagement'),backgroundColor:getPlatColors(),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:10,font:{size:10}}}}}});
  const c3=document.getElementById('engRateChart')?.getContext('2d');
  if(c3) charts['engRateChart']=new Chart(c3,{type:'bar',data:{labels:getPlatNames(),datasets:[{label:'Eng. Rate',data:getMetric('engNum'),backgroundColor:getPlatColors().map(c=>c+'CC'),borderRadius:8,barPercentage:0.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}});
  const c4=document.getElementById('followerDoughnut')?.getContext('2d');
  if(c4) charts['followerDoughnut']=new Chart(c4,{type:'doughnut',data:{labels:getPlatNames(),datasets:[{data:getMetric('followers'),backgroundColor:getPlatColors(),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:10,font:{size:10}}}}}});
}
function initSocialCharts() {
  destroyChart('socialViewsDoughnut'); destroyChart('socialEngDoughnut');
  const c1=document.getElementById('socialViewsDoughnut')?.getContext('2d');
  if(c1) charts['socialViewsDoughnut']=new Chart(c1,{type:'doughnut',data:{labels:getPlatNames(),datasets:[{data:getMetric('viewsNum'),backgroundColor:getPlatColors(),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:10,font:{size:10}}}}}});
  const c2=document.getElementById('socialEngDoughnut')?.getContext('2d');
  if(c2) charts['socialEngDoughnut']=new Chart(c2,{type:'doughnut',data:{labels:getPlatNames(),datasets:[{data:getMetric('engagement'),backgroundColor:getPlatColors(),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:10,font:{size:10}}}}}});
}
function initAudienceCharts() {
  destroyChart('audEngChart'); destroyChart('audSplitChart');
  const c1=document.getElementById('audEngChart')?.getContext('2d');
  if(c1) charts['audEngChart']=new Chart(c1,{type:'bar',data:{labels:getPlatNames(),datasets:[{label:'Eng %',data:getMetric('engNum'),backgroundColor:getPlatColors().map(c=>c+'CC'),borderRadius:8,barPercentage:0.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{callback:v=>v+'%'}},x:{grid:{display:false}}}}});
  const c2=document.getElementById('audSplitChart')?.getContext('2d');
  if(c2) charts['audSplitChart']=new Chart(c2,{type:'doughnut',data:{labels:getPlatNames(),datasets:[{data:getMetric('engagement'),backgroundColor:getPlatColors(),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',padding:10,font:{size:10}}}}}});
}

function switchTab(tab, btn) {
  document.querySelectorAll('.nav-tabs .nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); currentTab=tab; render();
}
function setMonth(month) { if(!DATA[month]) return; currentMonth=month; render(); }

render();
</script>
</body>
</html>
